spring.application.name=feat1
spring.datasource.url=jdbc:mysql://localhost:3306/mydb
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
jwt.access-expiration=900000
jwt.refresh-expiration=604800000
jwt.secret=${JWT_SECRET:change-me-change-me-change-me-change-me-32-bytes-min}
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=60000
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=5000
google.oauth.client-ids=${GOOGLE_OAUTH_CLIENT_IDS:}
auth.action-token.email-verification-expiration=${AUTH_EMAIL_VERIFICATION_EXPIRATION:86400000}
auth.action-token.password-reset-expiration=${AUTH_PASSWORD_RESET_EXPIRATION:900000}
table.seed.enabled=${TABLE_SEED_ENABLED:false}
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
order.events.order-created-topic=${ORDER_EVENTS_ORDER_CREATED_TOPIC:orders.created}
payment.events.topic=${PAYMENT_EVENTS_TOPIC:payments.events}
payment.qr.placeholder-base-url=${PAYMENT_QR_PLACEHOLDER_BASE_URL:http://localhost/payments/qr}
